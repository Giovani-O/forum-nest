version: "5.1.3"

services:
  postgres:
    container_name: forum-nest
    image: postgres
    ports:
      - 5432:5432
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: docker
      POSTGRES_DB: forum-nest
      PGDATA: /data/postgres
    volumes:
      - ./data/pg:/data/postgres
